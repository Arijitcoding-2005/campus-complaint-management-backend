spring.application.name=Campus Complaint Management System

spring.datasource.url=jdbc:mysql://campus-complaint-mysql-student-complaint-management.l.aivencloud.com:19231/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jackson.serialization.write-dates-as-timestamps=false
server.address=0.0.0.0
server.port=8080

jwt.secret=${JWT_SECRET}
admin.secret.key=${ADMIN_SECRET_KEY}
